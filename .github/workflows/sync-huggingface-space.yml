name: Sync Hugging Face Demo Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "pipeline/adapters.py"
      - "pipeline/fetch.py"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/sync-huggingface-space.yml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ vars.HF_SPACE_REPO != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Prepare minimal Space source
        run: |
          mkdir -p .space
          cp -R demo pipeline .space/
          cp pyproject.toml README.md LICENSE .space/
          cp demo/Dockerfile .space/Dockerfile
          cp demo/SPACE_README.md .space/README.md
      - name: Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          python -m pip install --disable-pip-version-check "huggingface_hub>=0.34,<2"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          repo_id = os.environ.get("HF_SPACE_REPO")
          if not token:
              raise SystemExit("HF_TOKEN secret is required")
          HfApi(token=token).upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path=".space",
              commit_message="Sync Link2News public demo",
          )
          PY
