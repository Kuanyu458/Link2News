name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps -e .
      - run: npm ci --ignore-scripts
      - run: python -m unittest discover -s tests -p 'test_*.py'
      - run: npm test
      - run: python -m compileall -q pipeline scripts tests
      - run: bash -n collector/*.sh launchd/*.sh pipeline/*.sh scripts/*.sh
      - run: bash scripts/check_public_tree.sh

  macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps -e .
      - run: cp pipeline/config.example.yaml pipeline/config.yaml
      - run: weekly-report run --dry-run
      - run: plutil -lint launchd/com.weekly.trigger.plist
